body {

.brand::before {

}
.controls {

.depthControl {

  background:rgba(255,255,255,.045);

  line-height:1;
  letter-spacing:.055em;

.depthControl span { white-space:nowrap; text-transform:uppercase; font-size:9px; letter-spacing:.13em; }
.depthControl select {

  background:transparent;

  font-size:12px;

  padding:3px 12px 3px 2px;

button {

  font-size:12px;
  line-height:1;

button:active { transform:translateY(1px); }
button:disabled { opacity:.42; cursor:not-allowed; transform:none; }
.thread {

  flex-direction:column;
  gap:10px;
  padding:4px 0 184px;

.opening {

  transform:translate(-50%, -50%);

  opacity:1;
  transition:opacity .22s ease, transform .22s ease;
  z-index:0;
  pointer-events:none;
}
.opening.hidden { opacity:0; transform:translate(-50%, -54%); }
.opening h1 {

.opening p {

  line-height:1.5;

.turn {

.turn.user { justify-content:flex-end; }
.turn.reply { justify-content:flex-start; }

  line-height:1.62;
  font-size:16.5px;

.user .bubble {

.reply .bubble {

  if (el) el.textContent = message;
}

window.addEventListener('error', event => {
  const msg = event && event.message ? event.message : 'Unknown script error';
  bootError('app error: ' + msg);
});

window.addEventListener('unhandledrejection', event => {
  const reason = event && event.reason;
  const msg = reason && reason.message ? reason.message : String(reason || 'unknown promise error');
  bootError('request error: ' + msg);
});

function flattenBanks() {
  const out = [];
  for (const lines of Object.values(BANKS)) {
    for (const text of lines) out.push(String(text));
  }
  return Array.from(new Set(out));
}
const RESPONSE_FIELD = flattenBanks().slice(0, MAX_CANDIDATES);

function getDepthCount() {
  const raw = Number(els.depth && els.depth.value ? els.depth.value : state.candidateDepth || DEFAULT_DEPTH);
  if (!Number.isFinite(raw)) return DEFAULT_DEPTH;
  return Math.max(1, Math.min(MAX_CANDIDATES, Math.floor(raw)));
}

function activeResponseField() {
  return RESPONSE_FIELD.slice(0, getDepthCount());
}

function cleanText(text) {
  return String(text || '').replace(/\s+/g, ' ').trim();
}

function setStatus(text) {
  els.status.textContent = text || '';
}

function scrollBottom() {
  requestAnimationFrame(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }));
}

function hideOpening() {
  els.opening.classList.add('hidden');
}

function showOpening() {
  els.opening.classList.remove('hidden');
}

function addTurn(role, text, options = {}) {
  hideOpening();
  const turn = document.createElement('div');
  turn.className = `turn ${role}${options.error ? ' error' : ''}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (options.typing) {
    bubble.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
  } else {
    bubble.textContent = text;
  }
  turn.appendChild(bubble);
  els.thread.appendChild(turn);
  scrollBottom();
  return turn;
}

function resizeInput() {
  els.input.style.height = 'auto';
  els.input.style.height = Math.min(140, els.input.scrollHeight) + 'px';
  els.send.disabled = state.busy || !els.input.value.trim();
}

function setBusy(value) {
  state.busy = value;
  els.input.disabled = value;
  els.send.disabled = value || !els.input.value.trim();
  els.mic.disabled = value || !SpeechRecognition;
}

function norm(text) {
  return cleanText(text).toLowerCase();
}

function getCandidateText(item) {
  if (!item) return '';
  if (typeof item === 'string') return item;
  if (typeof item.candidate === 'string') return item.candidate;
  if (typeof item.text === 'string') return item.text;
  if (typeof item.response === 'string') return item.response;
  if (typeof item.trigger === 'string') return item.trigger;
  if (typeof item.item === 'string') return item.item;
  if (item.candidate && typeof item.candidate.text === 'string') return item.candidate.text;
  if (item.document && typeof item.document.text === 'string') return item.document.text;
  if (item.payload && typeof item.payload.text === 'string') return item.payload.text;
  return '';
}

function getScore(item) {
  if (!item || typeof item !== 'object') return null;
  for (const key of ['score', 'coherence', 'similarity', 'value', 'rank_score', 'cosine', 'sim']) {
    const n = Number(item[key]);
    if (Number.isFinite(n)) return n;
  }
  if (item.score && typeof item.score === 'object') {
    for (const key of ['value', 'coherence', 'similarity']) {
      const n = Number(item.score[key]);
      if (Number.isFinite(n)) return n;
    }
  }
  return null;
}

function chunkArray(items, size) {
  const out = [];
  for (let i = 0; i < items.length; i += size) out.push(items.slice(i, i + size));
  return out;
}

function bestFromRanked(ranked) {
  const fieldSet = new Set(RESPONSE_FIELD);
  const rows = ranked
    .map((item, index) => ({ text: getCandidateText(item), score: getScore(item), index }))
    .filter(item => item.text && fieldSet.has(item.text));
  if (!rows.length) return null;
  if (rows.some(item => item.score !== null)) {
    rows.sort((a, b) => (b.score ?? -Infinity) - (a.score ?? -Infinity) || a.index - b.index);
  }
  return rows[0];
}

async function fetchNoTimeout(url, options) {
  return await fetch(url, options);
}

async function compareCandidates(query, candidates) {
  const response = await fetchNoTimeout(ARBITER_COMPARE_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'ngrok-skip-browser-warning': 'true'
    },
    body: JSON.stringify({ query, candidates })
  });
  const text = await response.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch (e) { data = {}; }
  if (!response.ok) {
    const message = data && (data.detail || data.error || data.message) ? String(data.detail || data.error || data.message) : `HTTP ${response.status}`;
    throw new Error(message);
  }
  const best = bestFromRanked(extractRanked(data));
  if (!best) throw new Error('No ranked response returned');
  return best;
}

async function compareWholeField(query) {
  const field = activeResponseField();
  const chunks = chunkArray(field, BATCH_SIZE);
  let next = 0;
  let done = 0;
  const winners = [];
  const startedAt = Date.now();
  let lastPct = 0;
  const heartbeat = setInterval(() => {
    const seconds = Math.max(1, Math.round((Date.now() - startedAt) / 1000));
    setStatus(`measuring ${field.length.toLocaleString()} replies · ${lastPct}% · ${seconds}s`);
  }, 4000);
  setStatus(`measuring ${field.length.toLocaleString()} replies · 0%`);

  async function worker() {
    while (next < chunks.length) {
      const index = next++;
      const best = await compareCandidates(query, chunks[index]);
      winners.push(best);
      done++;
      const pct = Math.round((done / chunks.length) * 100);
      lastPct = pct;
      setStatus(`measuring ${field.length.toLocaleString()} replies · ${pct}%`);
    }
  }

  const workers = Array.from({ length: Math.min(BATCH_CONCURRENCY, chunks.length) }, () => worker());
  try {
    await Promise.all(workers);
  } finally {
    clearInterval(heartbeat);
  }
  const valid = winners.filter(Boolean);
  if (!valid.length) return '';
  if (valid.some(item => item.score !== null)) {
    valid.sort((a, b) => (b.score ?? -Infinity) - (a.score ?? -Infinity) || a.index - b.index);
  }
  return valid[0].text || '';
}

function collectArrays(value, arrays = []) {
  if (!value || typeof value !== 'object') return arrays;
  if (Array.isArray(value)) {
    if (value.length && value.some(item => getCandidateText(item))) arrays.push(value);
    for (const item of value.slice(0, 20)) collectArrays(item, arrays);
    return arrays;
  }
  for (const key of Object.keys(value)) collectArrays(value[key], arrays);
  return arrays;
}

function extractRanked(data) {
  for (const key of ['all', 'rankings', 'results', 'matches', 'candidates', 'top_triggers']) {
    if (Array.isArray(data && data[key]) && data[key].some(item => getCandidateText(item))) return data[key].slice();
  }
  const topText = getCandidateText(data && data.top);
  if (topText) return [data.top];
  const arrays = collectArrays(data).sort((a, b) => b.length - a.length);
  return arrays[0] ? arrays[0].slice() : [];
}

function resolveResponse(ranked) {
  const fieldSet = new Set(RESPONSE_FIELD);
  const rows = ranked.map((item, index) => ({ text: getCandidateText(item), score: getScore(item), index })).filter(item => item.text);
  if (rows.some(item => item.score !== null)) {
    rows.sort((a, b) => (b.score ?? -Infinity) - (a.score ?? -Infinity) || a.index - b.index);
  }
  for (const item of rows) {
    if (fieldSet.has(item.text)) return item.text;
  }
  return '';
}

function chooseVoice() {
  if (!canSpeak) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  const preferred = ['Samantha', 'Google US English', 'Microsoft Jenny', 'Microsoft Aria', 'Victoria', 'Karen'];
  for (const name of preferred) {
    const voice = voices.find(v => v.name && v.name.toLowerCase().includes(name.toLowerCase()));
    if (voice) return voice;
  }
  return voices.find(v => /^en[-_]/i.test(v.lang || '')) || voices[0] || null;
}

function speak(text) {
  if (!state.voiceReplies || !canSpeak || !text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voice = chooseVoice();
  if (voice) u.voice = voice;
  u.rate = 0.94;
  u.pitch = 0.98;
  u.volume = 1;
  window.speechSynthesis.speak(u);
}

function setupSpeech() {
  if (!SpeechRecognition) {
    els.mic.disabled = true;
    els.mic.title = 'Voice input is not available in this browser';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = navigator.language || 'en-US';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    state.listening = true;
    state.finalTranscript = '';
    els.mic.classList.add('active');
    setStatus('listening');
  };
  recognition.onresult = event => {
    let interim = '';
    let finalText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += transcript;
      else interim += transcript;
    }
    if (finalText) state.finalTranscript += finalText;
    const visible = cleanText(`${state.finalTranscript} ${interim}`);
    if (visible) {
      els.input.value = visible;
      resizeInput();
    }
  };
  recognition.onerror = event => {
    setStatus(event && event.error === 'not-allowed' ? 'microphone blocked' : 'voice broke');
  };
  recognition.onend = () => {
    state.listening = false;
    els.mic.classList.remove('active');
    const text = cleanText(els.input.value);
    if (text && !state.busy) setTimeout(() => sendMessage(text), 120);
    else setTimeout(() => setStatus(''), 700);
  };
}

function handleCommand(clean) {
  const t = norm(clean);
  if (t === 'clear' || t === 'reset') {
    clearThread();
    return true;
  }
  if (t === 'voice on') {
    state.voiceReplies = true;
    els.voice.textContent = 'voice on';
    setStatus('voice replies on');
    return true;
  }
  if (t === 'voice off') {
    state.voiceReplies = false;
    els.voice.textContent = 'voice off';
    if (canSpeak) window.speechSynthesis.cancel();
    setStatus('voice replies off');
    return true;
  }
  return false;
}

async function sendMessage(text) {
  const clean = cleanText(text);
  if (!clean || state.busy) return;
  if (handleCommand(clean)) {
    els.input.value = '';
    resizeInput();
    setTimeout(() => setStatus(''), 900);
    return;
  }
  if (state.listening && recognition) {
    try { recognition.stop(); } catch (e) {}
  }
  if (canSpeak) window.speechSynthesis.cancel();

  addTurn('user', clean);
  state.history.push({ role: 'user', text: clean });
  state.history = state.history.slice(-MAX_HISTORY);
  els.input.value = '';
  resizeInput();
  setBusy(true);
  setStatus('');
  const typing = addTurn('reply', '', { typing: true });

  try {
    const selected = await compareWholeField(clean);
    typing.remove();
    if (!selected) {
      addTurn('reply', 'Nothing came back clean. Send it again.', { error: true });
      return;
    }
    addTurn('reply', selected);
    speak(selected);
    state.history.push({ role: 'reply', text: selected });
    state.history = state.history.slice(-MAX_HISTORY);
  } catch (err) {
    typing.remove();
    addTurn('reply', `Connection broke: ${err && err.message ? err.message : 'unknown error'}`, { error: true });
  } finally {
    setBusy(false);
    setStatus('');
    els.input.focus();
  }
}

function clearThread() {
  els.thread.innerHTML = '';
  state.history = [];
  if (canSpeak) window.speechSynthesis.cancel();
  showOpening();
  setStatus('');
  els.input.focus();
}

els.form.addEventListener('submit', event => {
  event.preventDefault();
  sendMessage(els.input.value);
});
els.send.addEventListener('click', event => {
  event.preventDefault();
  sendMessage(els.input.value);
});
els.input.addEventListener('input', resizeInput);
els.input.addEventListener('keydown', event => {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage(els.input.value);
  }
});
els.clear.addEventListener('click', clearThread);
els.depth.addEventListener('change', () => {
  state.candidateDepth = getDepthCount();
  try { localStorage.setItem('meantDepth', String(state.candidateDepth)); } catch (e) {}
  setStatus(`depth set to ${state.candidateDepth.toLocaleString()} replies`);
  setTimeout(() => setStatus(''), 900);
});
els.voice.addEventListener('click', () => {
  state.voiceReplies = !state.voiceReplies;
  els.voice.textContent = state.voiceReplies ? 'voice on' : 'voice off';
  if (!state.voiceReplies && canSpeak) window.speechSynthesis.cancel();
});
els.mic.addEventListener('click', () => {
  if (!recognition || state.busy) return;
  if (state.listening) {
    recognition.stop();
  } else {
    try { recognition.start(); } catch (e) {}
  }
});


try {
  const savedDepth = Number(localStorage.getItem('meantDepth'));
  if (Number.isFinite(savedDepth) && savedDepth > 0 && savedDepth <= MAX_CANDIDATES) {
    state.candidateDepth = savedDepth;
    els.depth.value = String(savedDepth);
  }
} catch (e) {}

setupSpeech();
resizeInput();
if (canSpeak) window.speechSynthesis.onvoiceschanged = chooseVoice;

</script>
</body>
</html>
